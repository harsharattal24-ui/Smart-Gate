<!DOCTYPE html>
<html>

<head>

<title>Railway Gate Tracker</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

    <h1>Railway Gate Tracker</h1>

    <!-- USER BOX -->

    <div class="user-box">

        <h2>Your Status</h2>

        <p id="locationText">

            Searching GPS...

        </p>

        <p id="speedText">

            Speed: 0 km/h

        </p>

    </div>

    <!-- GATE 1 -->

    <div class="gate-card">

        <h2>Cantonment Gate</h2>

        <p id="distance1">

            Distance: --

        </p>
        <p id="users1">
Waiting Users: 0
</p>

        <p id="prediction1">

            Prediction Time: --

        </p>

        <div id="status1" class="status unknown">

            NO DATA

        </div>

        <button
        class="route-btn"
        onclick="openRoute(
            15.1514586,
            76.8938312
        )">

            Open Route

        </button>

    </div>

    <!-- GATE 2 -->

    <div class="gate-card">

        <h2>Radio Park Gate</h2>

        <p id="distance2">

            Distance: --

        </p>
        <p id="users2">
Waiting Users: 0
</p>

        <p id="prediction2">

            Prediction Time: --

        </p>

        <div id="status2" class="status unknown">

            NO DATA

        </div>

        <button
        class="route-btn"
        onclick="openRoute(
            15.1445935,
            76.9047562
        )">

            Open Route

        </button>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
